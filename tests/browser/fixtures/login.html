<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in to Nexa CRM</title>
    <link rel="stylesheet" href="../../../espocrm/client/custom/css/nexa-design-system.css">
    <style>
        * { box-sizing: border-box; } body { align-items: center; background: #f2f4f7; display: grid; margin: 0; min-height: 100vh; padding: 24px; }
        main { background: #fff; border: 1px solid var(--nexa-border); border-radius: 6px; display: grid; gap: 20px; margin: auto; max-width: 420px; padding: 28px; width: 100%; }
        h1, p { margin: 0; } p { color: var(--nexa-muted); } .actions { display: grid; gap: 12px; }
    </style>
</head>
<body><main><div><strong>Nexa CRM</strong><h1>Welcome back</h1><p>Sign in to your workspace.</p></div><form class="actions"><div class="nexa-field"><label for="username">Username</label><input class="nexa-input" id="username" autocomplete="username"></div><div class="nexa-field"><label for="password">Password</label><input class="nexa-input" id="password" type="password" autocomplete="current-password"></div><button class="nexa-button" type="submit">Sign in</button></form></main></body>
</html>
