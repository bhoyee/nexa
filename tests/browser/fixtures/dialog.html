<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Nexa dialog</title><link rel="stylesheet" href="../../../espocrm/client/custom/css/nexa-design-system.css"><style>body{padding:24px}.nexa-dialog{border:1px solid var(--nexa-border);border-radius:6px;max-width:420px;padding:24px}.actions{display:flex;gap:8px;justify-content:flex-end}</style></head>
<body><main><h1>Dialog interaction fixture</h1><button class="nexa-button" id="open">Open account dialog</button><dialog class="nexa-dialog" id="dialog" aria-labelledby="dialog-title"><h2 id="dialog-title">Create account</h2><div class="nexa-field"><label for="account">Account name</label><input class="nexa-input" id="account" autofocus></div><div class="actions"><button class="nexa-button nexa-button--secondary" id="cancel">Cancel</button><button class="nexa-button" id="save">Save</button></div></dialog></main><script>const dialog=document.querySelector('#dialog');const open=document.querySelector('#open');open.addEventListener('click',()=>dialog.showModal());document.querySelector('#cancel').addEventListener('click',()=>dialog.close());dialog.addEventListener('close',()=>open.focus());</script></body></html>
