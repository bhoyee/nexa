<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Nexa components</title><link rel="stylesheet" href="../../../espocrm/client/custom/css/nexa-design-system.css"><style>*{box-sizing:border-box}body{margin:0;padding:24px;background:#f2f4f7}main{display:grid;gap:24px;margin:auto;max-width:960px}.surface{background:#fff;border:1px solid var(--nexa-border);border-radius:6px;padding:20px}.row{display:flex;flex-wrap:wrap;gap:12px}</style></head>
<body><main><header><h1>Nexa component foundations</h1><p>Design system 1.0</p></header><section class="surface"><h2>Commands</h2><div class="row"><button class="nexa-button">Save</button><button class="nexa-button nexa-button--secondary">Cancel</button><button class="nexa-button" disabled>Unavailable</button></div></section><section class="surface"><h2>Forms</h2><div class="nexa-field"><label for="company">Company</label><input class="nexa-input" id="company" value="Atlas Advisory"></div></section><section class="surface"><h2>Feedback</h2><p class="nexa-alert nexa-alert--success">Changes saved.</p><p class="nexa-alert nexa-alert--danger">Review the highlighted fields.</p></section><section class="surface"><h2>Records</h2><div class="nexa-table-wrap" role="region" aria-label="Example records" tabindex="0"><table class="nexa-table"><thead><tr><th>Name</th><th>Status</th></tr></thead><tbody><tr><td>Atlas Advisory</td><td>Active</td></tr></tbody></table></div></section><section class="surface"><h2>System states</h2><p class="nexa-empty">No records match this view.</p><p class="nexa-loading" role="status">Loading records</p></section></main></body></html>
