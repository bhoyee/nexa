<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexa shell fixture</title>
    <link rel="stylesheet" href="../../../espocrm/client/custom/css/nexa-design-system.css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #f6f8fa; }
        header { align-items: center; background: #fff; border-bottom: 1px solid var(--nexa-border); display: flex; height: 56px; justify-content: space-between; padding: 0 20px; }
        .brand { font-size: 20px; font-weight: 750; }
        .tenant { align-items: center; display: flex; gap: 8px; }
        .tenant span { background: var(--nexa-action); border-radius: 4px; color: #fff; padding: 6px; }
        .layout { display: grid; grid-template-columns: 248px minmax(0, 1fr); min-height: calc(100vh - 56px); }
        nav { background: #17202a; color: #fff; overflow-y: auto; padding: 16px 12px; }
        nav a { border-radius: 4px; color: #fff; display: block; padding: 10px 12px; text-decoration: none; }
        nav a[aria-current=page] { background: #344054; }
        main { min-width: 0; padding: 24px; }
        .panel { background: #fff; border: 1px solid var(--nexa-border); border-radius: 6px; padding: 20px; }
        .menu { display: none; }
        @media (max-width: 767px) {
            header { padding: 0 12px; } .menu { display: inline-flex; }
            .layout { display: block; } nav { display: none; height: calc(100vh - 56px); position: fixed; width: min(88vw, 320px); z-index: 2; }
            nav.open { display: block; } main { padding: 16px; }
        }
    </style>
</head>
<body>
<header><button class="nexa-button nexa-button--secondary menu" aria-controls="modules" aria-expanded="false">Menu</button><div class="brand">Nexa CRM</div><div class="tenant"><span aria-hidden="true">AA</span><strong id="tenant-name">Atlas Advisory</strong></div></header>
<div class="layout"><nav id="modules" aria-label="Workspace modules"><a href="#" aria-current="page">Home</a><a href="#">Accounts</a><a href="#">Contacts</a><a href="#">Marketing</a><a href="#">Automation</a><a href="#">Analytics</a><a href="#">Settings</a></nav>
<main><div class="nexa-toolbar"><h1>Customer workspace</h1><button class="nexa-button">Create contact</button></div><section class="panel" aria-labelledby="pipeline"><h2 id="pipeline">Sales pipeline</h2><div class="nexa-table-wrap" role="region" aria-label="Sales pipeline records" tabindex="0"><table class="nexa-table"><thead><tr><th>Deal</th><th>Stage</th><th>Owner</th></tr></thead><tbody><tr><td>Expansion programme</td><td>Qualified</td><td>Demo Admin</td></tr></tbody></table></div></section></main></div>
<script>
    const params = new URLSearchParams(location.search);
    if (params.get('tenant') === 'b') document.querySelector('#tenant-name').textContent = 'Beacon Studio';
    const button = document.querySelector('.menu'); const nav = document.querySelector('nav');
    button.addEventListener('click', () => { const open = nav.classList.toggle('open'); button.setAttribute('aria-expanded', String(open)); if (open) nav.querySelector('a').focus(); });
    nav.addEventListener('keydown', event => { if (event.key === 'Escape') { nav.classList.remove('open'); button.setAttribute('aria-expanded', 'false'); button.focus(); } });
</script>
</body>
</html>
