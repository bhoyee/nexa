name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring, openssl, pdo_mysql, zip
          coverage: none

      - name: Validate version and release commit
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath VERSION -Raw).Trim()
          $expectedTag = "v$version"

          if ($version -notmatch '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-[0-9A-Za-z.-]+)?$') {
              throw "VERSION is not a supported semantic version: $version"
          }

          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
              throw "Tag $env:GITHUB_REF_NAME does not match VERSION ($expectedTag)."
          }

          git fetch origin main --no-tags
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
              throw 'Release tags must point to a commit on main.'
          }

      - name: Verify repository
        shell: pwsh
        run: ./scripts/dev/verify.ps1 -Ci

      - name: Validate Compose configuration
        run: docker compose --env-file .env.example config --quiet

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          release_args=("$GITHUB_REF_NAME" --verify-tag --generate-notes --title "Nexa $GITHUB_REF_NAME")

          if [[ "$version" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"