name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Repository and source validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring, openssl, pdo_mysql, zip
          coverage: none
      - name: Validate repository
        shell: pwsh
        run: ./scripts/dev/verify.ps1 -Ci
      - name: Validate Compose configuration
        run: docker compose --env-file .env.example config --quiet

  control-plane-schema:
    name: Control-plane schema
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: ci_root_password
          MARIADB_DATABASE: nexa_control_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: Install MariaDB client
        run: sudo apt-get update && sudo apt-get install --yes mariadb-client
      - name: Apply control-plane migrations
        run: |
          for migration in database/control-plane/migrations/*.sql; do
            mariadb --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_control_test < "$migration"
          done
      - name: Apply development seeds twice
        run: |
          for pass in 1 2; do
            for seed in database/control-plane/seeds/*.sql; do
              mariadb --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_control_test < "$seed"
            done
          done
      - name: Verify expected baseline
        run: |
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password --execute='SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = "nexa_control_test"')" = "11"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_control_test --execute='SELECT COUNT(*) FROM plan_definition')" = "3"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_control_test --execute='SELECT COUNT(*) FROM feature_definition')" = "5"
