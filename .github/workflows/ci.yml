name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Repository and source validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring, openssl, pdo_mysql, zip
          coverage: none
      - name: Validate repository
        shell: pwsh
        run: ./scripts/dev/verify.ps1 -Ci
      - name: Validate Compose configuration
        run: docker compose --env-file .env.example config --quiet

  shared-schema-foundation:
    name: Shared-schema SaaS foundation
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: ci_root_password
          MARIADB_DATABASE: nexa_shared_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: Configure PHP 8.2 for database smoke tests
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql
          coverage: none
      - name: Install MariaDB client
        run: sudo apt-get update && sudo apt-get install --yes mariadb-client
      - name: Load pinned EspoCRM schema fixture
        run: mariadb --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_shared_test < database/shared/testing/0000_espocrm_9_1_9_schema.sql
      - name: Apply shared-schema migrations
        run: |
          for migration in database/shared/migrations/*.sql; do
            mariadb --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_shared_test < "$migration"
          done
      - name: Apply development seeds twice
        run: |
          for pass in 1 2; do
            for seed in database/shared/seeds/*.sql; do
              mariadb --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_shared_test < "$seed"
            done
          done
      - name: Verify expected baseline
        run: |
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password --execute='SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = "nexa_shared_test"')" = "150"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_shared_test --execute='SELECT COUNT(*) FROM nexa_plan_definition')" = "3"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_shared_test --execute='SELECT COUNT(*) FROM nexa_service_definition')" = "5"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password --execute='SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = "nexa_shared_test" AND column_name = "tenant_id"')" = "141"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password --execute='SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = "nexa_shared_test" AND column_name = "service_id"')" = "138"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password --execute='SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = "nexa_shared_test" AND table_name IN ("address_country", "extension", "system_data") AND column_name IN ("tenant_id", "service_id")')" = "0"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password --execute='SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = "nexa_shared_test" AND column_name = "tenant_id" AND is_nullable = "YES"')" = "0"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password --execute='SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = "nexa_shared_test" AND column_name = "tenant_id" AND column_default IS NOT NULL')" = "0"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_shared_test --execute='SELECT COUNT(*) FROM nexa_tenant WHERE slug IN ("isolation-alpha", "isolation-beta")')" = "2"
      - name: Prove two-tenant database isolation
        run: |
          mariadb --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_shared_test <<'SQL'
          INSERT INTO account (id, name, deleted, tenant_id) VALUES
            ('iso-account-a-001', 'Shared Business Name', 0, '30000000-0000-4000-8000-000000000001'),
            ('iso-account-b-001', 'Shared Business Name', 0, '30000000-0000-4000-8000-000000000002');
          INSERT INTO user (id, user_name, type, password, is_active, delete_id, tenant_id) VALUES
            ('iso-user-a-000001', 'shared-admin', 'admin', 'test-only', 1, '0', '30000000-0000-4000-8000-000000000001'),
            ('iso-user-b-000001', 'shared-admin', 'admin', 'test-only', 1, '0', '30000000-0000-4000-8000-000000000002');
          UPDATE account SET name = 'Must Not Change'
            WHERE id = 'iso-account-b-001' AND tenant_id = '30000000-0000-4000-8000-000000000001';
          DELETE FROM account
            WHERE id = 'iso-account-a-001' AND tenant_id = '30000000-0000-4000-8000-000000000002';
          SQL
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_shared_test --execute='SELECT COUNT(*) FROM account WHERE tenant_id = "30000000-0000-4000-8000-000000000001" AND name = "Shared Business Name"')" = "1"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_shared_test --execute='SELECT COUNT(*) FROM account WHERE tenant_id = "30000000-0000-4000-8000-000000000002" AND name = "Shared Business Name"')" = "1"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --port=3306 --user=root --password=ci_root_password nexa_shared_test --execute='SELECT COUNT(*) FROM user WHERE user_name = "shared-admin" AND tenant_id IN ("30000000-0000-4000-8000-000000000001", "30000000-0000-4000-8000-000000000002")')" = "2"
      - name: Run tenant CRM database smoke tests
        env:
          NEXA_TEST_DB_HOST: 127.0.0.1
          NEXA_TEST_DB_NAME: nexa_shared_test
          NEXA_TEST_DB_USER: root
          NEXA_TEST_DB_PASSWORD: ci_root_password
        run: php tests/tenant/CrmDatabaseSmokeTest.php
      - name: Prove upgrade migration preserves existing CRM records
        run: |
          mariadb --host=127.0.0.1 --user=root --password=ci_root_password --execute='DROP DATABASE IF EXISTS nexa_upgrade_test; CREATE DATABASE nexa_upgrade_test CHARACTER SET utf8mb4;'
          mariadb --host=127.0.0.1 --user=root --password=ci_root_password nexa_upgrade_test < database/shared/testing/0000_espocrm_9_1_9_schema.sql
          mariadb --host=127.0.0.1 --user=root --password=ci_root_password nexa_upgrade_test <<'SQL'
          INSERT INTO account (id, name, deleted) VALUES ('upgradeaccount001', 'Existing account', 0);
          INSERT INTO contact (id, first_name, last_name, deleted) VALUES ('upgradecontact001', 'Existing', 'Contact', 0);
          INSERT INTO lead (id, first_name, last_name, deleted) VALUES ('upgradelead000001', 'Existing', 'Lead', 0);
          INSERT INTO opportunity (id, name, deleted) VALUES ('upgradeopport001', 'Existing deal', 0);
          SQL
          for migration in database/shared/migrations/*.sql; do
            mariadb --host=127.0.0.1 --user=root --password=ci_root_password nexa_upgrade_test < "$migration"
          done
          test "$(mariadb --skip-column-names --host=127.0.0.1 --user=root --password=ci_root_password nexa_upgrade_test --execute='SELECT COUNT(*) FROM account WHERE tenant_id = "00000000-0000-4000-8000-000000000001"')" = "1"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --user=root --password=ci_root_password nexa_upgrade_test --execute='SELECT COUNT(*) FROM contact WHERE tenant_id = "00000000-0000-4000-8000-000000000001"')" = "1"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --user=root --password=ci_root_password nexa_upgrade_test --execute='SELECT COUNT(*) FROM lead WHERE tenant_id = "00000000-0000-4000-8000-000000000001"')" = "1"
          test "$(mariadb --skip-column-names --host=127.0.0.1 --user=root --password=ci_root_password nexa_upgrade_test --execute='SELECT COUNT(*) FROM opportunity WHERE tenant_id = "00000000-0000-4000-8000-000000000001"')" = "1"

  browser-quality:
    name: Shell accessibility and visual validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:shell
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shell-browser-evidence
          path: test-results
          retention-days: 14
