name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["type: bug", "status: triage"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, customer data or vulnerability details. Use private vulnerability reporting for security issues.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: Commit SHA or release
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Docker
        - XAMPP
        - CI
        - Staging
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: Provide the smallest repeatable sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Remove credentials, tokens, customer data and personal information.
