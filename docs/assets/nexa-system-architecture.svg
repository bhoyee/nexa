<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1150" viewBox="0 0 1600 1150" role="img" aria-labelledby="title desc">
  <title id="title">Nexa shared-schema modular monolith architecture</title>
  <desc id="desc">Users enter through tenant-aware access controls into the Nexa modular PHP application. The application uses automatic tenant scoping with one shared MariaDB schema, background workers and supporting infrastructure.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,4 L0,8 Z" fill="#1f252b"/>
    </marker>
    <marker id="arrow-start" markerWidth="12" markerHeight="8" refX="2" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M12,0 L0,4 L12,8 Z" fill="#1f252b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#111820" flood-opacity="0.16"/>
    </filter>
    <style>
      .canvas { fill: #f7f7f4; }
      .panel { fill: #ffffff; stroke: #7f8b96; stroke-width: 1.5; filter: url(#shadow); }
      .head-blue { fill: #dceaff; stroke: #6f91bf; stroke-width: 1.5; }
      .head-green { fill: #dcefe7; stroke: #6f9e8b; stroke-width: 1.5; }
      .head-yellow { fill: #fff4b8; stroke: #b6a158; stroke-width: 1.5; }
      .head-gray { fill: #e7eaed; stroke: #858f98; stroke-width: 1.5; }
      .cell-blue { fill: #eef5ff; stroke: #88a8d2; stroke-width: 1.25; }
      .cell-green { fill: #edf8f3; stroke: #83aa99; stroke-width: 1.25; }
      .cell-yellow { fill: #fff9d9; stroke: #c2ae62; stroke-width: 1.25; }
      .cell-gray { fill: #f3f4f5; stroke: #a1a8ae; stroke-width: 1.25; }
      .title { font-family: "Segoe UI", Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #161b20; text-anchor: middle; letter-spacing: 0; }
      .subtitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #4a545d; text-anchor: middle; letter-spacing: 0; }
      .label { font-family: "Segoe UI", Arial, sans-serif; font-size: 17px; font-weight: 600; fill: #20262c; text-anchor: middle; letter-spacing: 0; }
      .small { font-family: "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #333c44; text-anchor: middle; letter-spacing: 0; }
      .note { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #28323a; text-anchor: middle; letter-spacing: 0; }
      .flow { fill: none; stroke: #1f252b; stroke-width: 2.5; marker-end: url(#arrow); }
      .flow-both { fill: none; stroke: #1f252b; stroke-width: 2.5; marker-start: url(#arrow-start); marker-end: url(#arrow); }
      .rail { fill: none; stroke: #53616d; stroke-width: 2; }
    </style>
  </defs>

  <rect class="canvas" width="1600" height="1150"/>

  <!-- Entry channels -->
  <g>
    <rect class="panel" x="35" y="45" width="310" height="180"/>
    <rect class="head-yellow" x="35" y="45" width="310" height="44"/>
    <text class="title" x="190" y="74">USERS &amp; CHANNELS</text>
    <rect class="cell-yellow" x="55" y="108" width="125" height="42"/>
    <rect class="cell-yellow" x="200" y="108" width="125" height="42"/>
    <rect class="cell-yellow" x="55" y="164" width="125" height="42"/>
    <rect class="cell-yellow" x="200" y="164" width="125" height="42"/>
    <text class="label" x="117.5" y="135">Web App</text>
    <text class="label" x="262.5" y="135">Mobile</text>
    <text class="label" x="117.5" y="191">API Clients</text>
    <text class="label" x="262.5" y="184"><tspan x="262.5">Tenant</tspan><tspan x="262.5" dy="17">Domains</tspan></text>
  </g>

  <!-- Tenant request boundary -->
  <g>
    <rect class="panel" x="425" y="45" width="740" height="180"/>
    <rect class="head-blue" x="425" y="45" width="740" height="44"/>
    <text class="title" x="795" y="74">ACCESS &amp; TENANT REQUEST BOUNDARY</text>
    <rect class="cell-blue" x="445" y="108" width="160" height="72"/>
    <rect class="cell-blue" x="625" y="108" width="160" height="72"/>
    <rect class="cell-blue" x="805" y="108" width="160" height="72"/>
    <rect class="cell-blue" x="985" y="108" width="160" height="72"/>
    <text class="label" x="525" y="137"><tspan x="525">Tenant</tspan><tspan x="525" dy="20">Resolver</tspan></text>
    <text class="label" x="705" y="137"><tspan x="705">Authentication</tspan><tspan x="705" dy="20">&amp; Session</tspan></text>
    <text class="label" x="885" y="137"><tspan x="885">Entitlement</tspan><tspan x="885" dy="20">Check</tspan></text>
    <text class="label" x="1065" y="137"><tspan x="1065">Immutable</tspan><tspan x="1065" dy="20">Tenant Context</tspan></text>
    <rect class="head-gray" x="520" y="190" width="550" height="24"/>
    <text class="small" x="795" y="207">Trusted tenant_id + user_id + service context on every request</text>
  </g>

  <!-- Identity -->
  <g>
    <rect class="panel" x="1255" y="45" width="310" height="180"/>
    <rect class="head-green" x="1255" y="45" width="310" height="44"/>
    <text class="title" x="1410" y="74">IDENTITY &amp; POLICY</text>
    <rect class="cell-green" x="1275" y="108" width="125" height="42"/>
    <rect class="cell-green" x="1420" y="108" width="125" height="42"/>
    <rect class="cell-green" x="1275" y="164" width="125" height="42"/>
    <rect class="cell-green" x="1420" y="164" width="125" height="42"/>
    <text class="small" x="1337.5" y="126"><tspan x="1337.5">SSO &amp; Social</tspan><tspan x="1337.5" dy="16">Login</tspan></text>
    <text class="label" x="1482.5" y="135">Roles</text>
    <text class="label" x="1337.5" y="191">Teams</text>
    <text class="small" x="1482.5" y="182"><tspan x="1482.5">Permissions &amp;</tspan><tspan x="1482.5" dy="16">Policies</tspan></text>
  </g>

  <path class="flow" d="M345 135 H410"/>
  <path class="flow" d="M1255 135 H1180"/>
  <path class="flow" d="M795 225 V276"/>

  <!-- Modular monolith -->
  <g>
    <rect class="panel" x="135" y="290" width="1330" height="345"/>
    <rect class="head-blue" x="135" y="290" width="1330" height="54"/>
    <text class="title" x="690" y="322">NEXA MODULAR MONOLITH</text>
    <text class="subtitle" x="1200" y="321">One PHP application · One version · One release</text>

    <rect class="cell-blue" x="160" y="365" width="240" height="92"/>
    <rect class="cell-blue" x="420" y="365" width="240" height="92"/>
    <rect class="cell-blue" x="680" y="365" width="240" height="92"/>
    <rect class="cell-blue" x="940" y="365" width="240" height="92"/>
    <rect class="cell-blue" x="1200" y="365" width="240" height="92"/>

    <text class="label" x="280" y="398">Platform Core</text>
    <text class="small" x="280" y="425"><tspan x="280">Configuration · Flags</tspan><tspan x="280" dy="17">API · Audit · Queues</tspan></text>
    <text class="label" x="540" y="398">CRM Data Platform</text>
    <text class="small" x="540" y="425"><tspan x="540">Contacts · Accounts</tspan><tspan x="540" dy="17">Leads · Deals · Activities</tspan></text>
    <text class="label" x="800" y="398">Sales Workspace</text>
    <text class="small" x="800" y="425"><tspan x="800">Pipelines · Tasks</tspan><tspan x="800" dy="17">Calendar · Collaboration</tspan></text>
    <text class="label" x="1060" y="398">Marketing</text>
    <text class="small" x="1060" y="425"><tspan x="1060">Segments · Campaigns</tspan><tspan x="1060" dy="17">Forms · Email · Consent</tspan></text>
    <text class="label" x="1320" y="398">Automation</text>
    <text class="small" x="1320" y="425"><tspan x="1320">Triggers · Actions</tspan><tspan x="1320" dy="17">Branches · Scoring</tspan></text>

    <rect class="cell-green" x="160" y="477" width="240" height="92"/>
    <rect class="cell-green" x="420" y="477" width="240" height="92"/>
    <rect class="cell-green" x="680" y="477" width="240" height="92"/>
    <rect class="cell-green" x="940" y="477" width="240" height="92"/>
    <rect class="cell-green" x="1200" y="477" width="240" height="92"/>

    <text class="label" x="280" y="510">Service &amp; Engagement</text>
    <text class="small" x="280" y="537"><tspan x="280">Cases · Knowledge</tspan><tspan x="280" dy="17">Portals · Conversations</tspan></text>
    <text class="label" x="540" y="510">Messaging &amp; Channels</text>
    <text class="small" x="540" y="537"><tspan x="540">Email · SMS · WhatsApp</tspan><tspan x="540" dy="17">Social · Advertising</tspan></text>
    <text class="label" x="800" y="510">Analytics</text>
    <text class="small" x="800" y="537"><tspan x="800">Reports · Attribution</tspan><tspan x="800" dy="17">Journeys · Events</tspan></text>
    <text class="label" x="1060" y="510">Identity &amp; Access</text>
    <text class="small" x="1060" y="537"><tspan x="1060">Users · Teams · Roles</tspan><tspan x="1060" dy="17">SSO · Sensitive Data</tspan></text>
    <text class="label" x="1320" y="510">SaaS Administration</text>
    <text class="small" x="1320" y="537"><tspan x="1320">Tenants · Plans · Usage</tspan><tspan x="1320" dy="17">Billing · Provisioning</tspan></text>

    <rect class="head-yellow" x="300" y="590" width="1000" height="28"/>
    <text class="note" x="800" y="609">Central ORM ownership registry enforces tenant scope before repositories access data</text>
  </g>

  <path class="flow-both" d="M720 635 V697"/>
  <path class="flow" d="M1160 635 V680 H1255 V710"/>

  <!-- Shared database -->
  <g>
    <rect class="panel" x="135" y="710" width="930" height="225"/>
    <rect class="head-green" x="135" y="710" width="930" height="50"/>
    <text class="title" x="600" y="742">ONE SHARED MARIADB SCHEMA</text>

    <rect class="cell-green" x="160" y="782" width="200" height="78"/>
    <rect class="cell-green" x="380" y="782" width="200" height="78"/>
    <rect class="cell-green" x="600" y="782" width="200" height="78"/>
    <rect class="cell-green" x="820" y="782" width="220" height="78"/>
    <text class="label" x="260" y="811"><tspan x="260">Tenant-Scoped</tspan><tspan x="260" dy="20">CRM Tables</tspan></text>
    <text class="label" x="480" y="811"><tspan x="480">Nexa Product</tspan><tspan x="480" dy="20">Tables</tspan></text>
    <text class="label" x="700" y="811"><tspan x="700">SaaS Admin</tspan><tspan x="700" dy="20">Tables</tspan></text>
    <text class="label" x="930" y="811"><tspan x="930">Outbox · Audit</tspan><tspan x="930" dy="20">Migration History</tspan></text>

    <rect class="head-yellow" x="260" y="882" width="680" height="32"/>
    <text class="note" x="600" y="903">tenant_id owns customer data · service_id scopes service-specific records</text>
  </g>

  <!-- Background workers -->
  <g>
    <rect class="panel" x="1120" y="710" width="345" height="225"/>
    <rect class="head-gray" x="1120" y="710" width="345" height="50"/>
    <text class="title" x="1292.5" y="742">BACKGROUND EXECUTION</text>
    <rect class="cell-gray" x="1145" y="782" width="135" height="58"/>
    <rect class="cell-gray" x="1305" y="782" width="135" height="58"/>
    <rect class="cell-gray" x="1145" y="858" width="135" height="58"/>
    <rect class="cell-gray" x="1305" y="858" width="135" height="58"/>
    <text class="label" x="1212.5" y="817">Scheduler</text>
    <text class="label" x="1372.5" y="817">Workers</text>
    <text class="small" x="1212.5" y="883"><tspan x="1212.5">Email &amp;</tspan><tspan x="1212.5" dy="17">Automation</tspan></text>
    <text class="small" x="1372.5" y="883"><tspan x="1372.5">Imports &amp;</tspan><tspan x="1372.5" dy="17">Webhooks</tspan></text>
  </g>

  <path class="flow" d="M600 935 V975"/>
  <path class="flow" d="M1292 935 V975"/>

  <!-- Supporting infrastructure -->
  <g>
    <rect class="panel" x="135" y="990" width="1330" height="125"/>
    <rect class="head-yellow" x="135" y="990" width="255" height="125"/>
    <text class="title" x="262.5" y="1038"><tspan x="262.5">SUPPORTING</tspan><tspan x="262.5" dy="25">INFRASTRUCTURE</tspan></text>

    <rect class="cell-yellow" x="420" y="1013" width="220" height="78"/>
    <rect class="cell-yellow" x="665" y="1013" width="220" height="78"/>
    <rect class="cell-yellow" x="910" y="1013" width="220" height="78"/>
    <rect class="cell-yellow" x="1155" y="1013" width="280" height="78"/>
    <text class="label" x="530" y="1044">Redis</text>
    <text class="small" x="530" y="1068">Cache · Queues · Locks</text>
    <text class="label" x="775" y="1044">Object Storage</text>
    <text class="small" x="775" y="1068">Files · Media · Exports</text>
    <text class="label" x="1020" y="1044">OpenSearch</text>
    <text class="small" x="1020" y="1068">Tenant-Filtered Search</text>
    <text class="label" x="1295" y="1044">Analytics Platform</text>
    <text class="small" x="1295" y="1068">Warehouse · Metabase</text>
  </g>
</svg>