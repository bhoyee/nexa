name: espocrm-local

x-espocrm-image: &espocrm-image espocrm/espocrm:${ESPOCRM_VERSION:-9.1.9}

services:
  database:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
      MARIADB_DATABASE: ${DB_NAME:-espocrm}
      MARIADB_USER: espocrm
      MARIADB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - database-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      start_period: 20s
      timeout: 5s
      retries: 10

  espocrm:
    image: *espocrm-image
    environment:
      ESPOCRM_DATABASE_HOST: database
      ESPOCRM_DATABASE_NAME: ${DB_NAME:-espocrm}
      ESPOCRM_DATABASE_USER: espocrm
      ESPOCRM_DATABASE_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      ESPOCRM_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ESPOCRM_ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      NEXA_TENANT_A_ADMIN_USERNAME: ${DEMO_TENANT_A_ADMIN_USERNAME:-demo-admin}
      NEXA_TENANT_A_ADMIN_PASSWORD: ${DEMO_TENANT_A_ADMIN_PASSWORD:?Set DEMO_TENANT_A_ADMIN_PASSWORD in .env}
      NEXA_TENANT_B_ADMIN_USERNAME: ${DEMO_TENANT_B_ADMIN_USERNAME:-demo-admin-b}
      NEXA_TENANT_B_ADMIN_PASSWORD: ${DEMO_TENANT_B_ADMIN_PASSWORD:?Set DEMO_TENANT_B_ADMIN_PASSWORD in .env}
      NEXA_SIGNUP_EXPOSE_VERIFICATION_CODE: ${NEXA_SIGNUP_EXPOSE_VERIFICATION_CODE:-false}
      NEXA_AUTH_GOOGLE_ENABLED: ${NEXA_AUTH_GOOGLE_ENABLED:-false}
      NEXA_AUTH_GOOGLE_CLIENT_ID: ${NEXA_AUTH_GOOGLE_CLIENT_ID:-}
      NEXA_AUTH_GOOGLE_CLIENT_SECRET: ${NEXA_AUTH_GOOGLE_CLIENT_SECRET:-}
      NEXA_AUTH_GOOGLE_REDIRECT_URI: ${NEXA_AUTH_GOOGLE_REDIRECT_URI:-}
      NEXA_AUTH_MICROSOFT_ENABLED: ${NEXA_AUTH_MICROSOFT_ENABLED:-false}
      NEXA_AUTH_MICROSOFT_CLIENT_ID: ${NEXA_AUTH_MICROSOFT_CLIENT_ID:-}
      NEXA_AUTH_MICROSOFT_CLIENT_SECRET: ${NEXA_AUTH_MICROSOFT_CLIENT_SECRET:-}
      NEXA_AUTH_MICROSOFT_TENANT_ID: ${NEXA_AUTH_MICROSOFT_TENANT_ID:-common}
      NEXA_AUTH_MICROSOFT_REDIRECT_URI: ${NEXA_AUTH_MICROSOFT_REDIRECT_URI:-}
      NEXA_AUTH_SECRET_KEY: ${NEXA_AUTH_SECRET_KEY:?Set NEXA_AUTH_SECRET_KEY in .env}
      ESPOCRM_SITE_URL: ${ESPOCRM_SITE_URL:-http://localhost:8080}
      ESPOCRM_TIME_ZONE: ${ESPOCRM_TIME_ZONE:-Europe/London}
      ESPOCRM_CONFIG_APPLICATION_NAME: ${CRM_NAME:-Nexa CRM}
      ESPOCRM_CONFIG_SMTP_SERVER: ${SMTP_HOST:-}
      ESPOCRM_CONFIG_SMTP_PORT: ${SMTP_PORT:-587}
      ESPOCRM_CONFIG_SMTP_SECURITY: ${SMTP_SECURITY:-TLS}
      ESPOCRM_CONFIG_SMTP_AUTH: ${SMTP_AUTH:-true}
      ESPOCRM_CONFIG_SMTP_USERNAME: ${SMTP_USERNAME:-}
      ESPOCRM_CONFIG_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ESPOCRM_CONFIG_OUTBOUND_EMAIL_FROM_ADDRESS: ${SMTP_FROM_EMAIL:-}
      ESPOCRM_CONFIG_OUTBOUND_EMAIL_FROM_NAME: ${SMTP_FROM_NAME:-Nexa CRM}
      ESPOCRM_CONFIG_OUTBOUND_EMAIL_IS_SHARED: "true"
    volumes:

      - ./espocrm:/var/www/html

    ports:
      - "${ESPOCRM_PORT:-8080}:80"
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "$$socket = @fsockopen('127.0.0.1', 80); exit($$socket ? 0 : 1);"]
      interval: 30s
      start_period: 60s
      timeout: 15s
      retries: 10

  daemon:
    image: *espocrm-image
    entrypoint: docker-daemon.sh
    volumes_from:
      - espocrm
    restart: unless-stopped
    depends_on:
      espocrm:
        condition: service_healthy


volumes:
  database-data:
